name: Release on merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  detect:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      kind: ${{ steps.label.outputs.kind }}
    steps:
      - name: Detect release label
        id: label
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          kind=""
          for l in $(echo "$LABELS" | jq -r '.[]'); do
            case "$l" in
              release:major) kind="major" ;;
              release:minor) kind="minor" ;;
              release:patch) kind="patch" ;;
            esac
          done
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          if [ -z "$kind" ]; then
            echo "No release label — skipping bump."
          else
            echo "Release kind: $kind"
          fi

  release:
    needs: detect
    if: needs.detect.outputs.kind != ''
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Bump version + transform CHANGELOG
        id: bump
        run: bun run scripts/bump-version.ts ${{ needs.detect.outputs.kind }}

      - name: Commit + push + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git tag -a "v${{ steps.bump.outputs.version }}" \
            -m "v${{ steps.bump.outputs.version }} (auto, ${{ needs.detect.outputs.kind }} bump from v${{ steps.bump.outputs.prev_version }})"
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Extract release notes from CHANGELOG
        run: |
          awk -v ver="${{ steps.bump.outputs.version }}" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes-file release_notes.md
