name: Telegram preview notify

on:
  deployment_status:

permissions:
  contents: read
  pull-requests: read
  deployments: read

jobs:
  notify:
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'Production' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Look up PR for deployed SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.deployment.sha }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh api "/repos/$REPO/commits/$SHA/pulls" 2>/dev/null || echo "[]")
          # ΉΩΡΈθυ ΉζΣΈΜ╡Ήζ┤ objectΈκε ΉανΈσ┤ Έ╣Ι Έ░░ΉΩ┤Έκε Ή▓αΈου
          if echo "$PR_JSON" | jq -e 'type != "array"' >/dev/null 2>&1; then
            PR_JSON="[]"
          fi
          echo "number=$(echo "$PR_JSON"   | jq -r '.[0].number   // empty')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$PR_JSON"      | jq -r '.[0].html_url // empty')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_JSON"    | jq -r '.[0].title    // empty')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON" | jq -r '.[0].head.ref // empty')" >> "$GITHUB_OUTPUT"

      - name: Checkout repo at deployed SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 1

      - name: Extract & format CHANGELOG [Unreleased]
        id: cl
        run: |
          set -euo pipefail
          [ -f CHANGELOG.md ] || { echo "content=" >> "$GITHUB_OUTPUT"; exit 0; }

          UNREL=$(awk '/^## \[Unreleased\]/{f=1; next} /^## \[/{f=0} f' CHANGELOG.md | sed '/./,$!d')
          [ -z "$UNREL" ] && { echo "content=" >> "$GITHUB_OUTPUT"; exit 0; }

          # HTML escape (& < > ΈπΝ)
          ESC=$(printf '%s' "$UNREL" | python3 -c 'import sys,html; print(html.escape(sys.stdin.read()), end="")')

          # ### Header έΗΤ <b>Header</b>, "- " έΗΤ "έΑλ "
          FMT=$(printf '%s' "$ESC" | sed -E 's@^### (.+)$@<b>\1</b>@; s@^- @έΑλ @')

          # ΉνΕ ΈΜρΉεΕ truncate
          MAX=20
          TOTAL=$(printf '%s\n' "$FMT" | wc -l | tr -d ' ')
          if [ "$TOTAL" -gt "$MAX" ]; then
            BODY=$(printf '%s\n' "$FMT" | head -n "$MAX")
            BODY="${BODY}"$'\n'"<i>έΑοand $((TOTAL - MAX)) more lines</i>"
          else
            BODY="$FMT"
          fi

          {
            echo "content<<EOF_CL"
            printf '%s\n' "$BODY"
            echo "EOF_CL"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
          PREVIEW_URL:  ${{ github.event.deployment_status.target_url }}
          REF:          ${{ github.event.deployment.ref }}
          SHA:          ${{ github.event.deployment.sha }}
          REPO:         ${{ github.repository }}
          PR_NUMBER:    ${{ steps.pr.outputs.number }}
          PR_URL:       ${{ steps.pr.outputs.url }}
          PR_TITLE:     ${{ steps.pr.outputs.title }}
          PR_HEAD_REF:  ${{ steps.pr.outputs.head_ref }}
          CHANGELOG:    ${{ steps.cl.outputs.content }}
        run: |
          set -euo pipefail
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "::warning::TG_BOT_TOKEN or TG_CHAT_ID secret missing"; exit 0
          fi

          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          PROJECT=$(echo "$REPO" | cut -d/ -f2)
          PROJECT_TAG=$(echo "$PROJECT" | tr '-' '_')

          # ΉπΕΉπε Έ╕ΝΈηεΉ╣αΈςΖ: PR head.ref Ήγ░ΉΕι, ΉΩΗΉε╝Έσ┤ deployment.ref, SHAΉ▓αΈθ╝ Έ│┤Ήζ┤Έσ┤ Έ╣ΕΉδΑ
          DISPLAY_REF="${PR_HEAD_REF:-$REF}"
          if echo "$DISPLAY_REF" | grep -qE '^[0-9a-f]{40}$'; then
            DISPLAY_REF=""
          fi

          # ΊΧ┤ΉΜεΊΔεΆ╖╕
          TAGS="#${PROJECT_TAG} #preview"
          [ -n "$PR_NUMBER" ] && TAGS="$TAGS #PR${PR_NUMBER}"

          # HTML escape helper
          esc() { printf '%s' "$1" | python3 -c 'import sys,html; print(html.escape(sys.stdin.read()), end="")'; }

          PROJECT_E=$(esc "$PROJECT")
          PR_TITLE_E=$(esc "$PR_TITLE")
          REF_E=$(esc "$DISPLAY_REF")

          # Έ│╕Έυ╕
          MSG="$TAGS"$'\n\n'"ΏθγΑ <b>$PROJECT_E</b> έΑΦ Preview deploy"
          if [ -n "$PR_TITLE_E" ]; then
            MSG="$MSG"$'\n'"έΦΦ <i>$PR_TITLE_E</i>"
          fi
          if [ -n "$REF_E" ]; then
            MSG="$MSG"$'\n'"έΦΦ <code>$REF_E</code> ┬╖ <code>$SHORT_SHA</code>"
          else
            MSG="$MSG"$'\n'"έΦΦ <code>$SHORT_SHA</code>"
          fi
          if [ -n "$CHANGELOG" ]; then
            MSG="$MSG"$'\n\n'"ΏθΥΜ <b>[Unreleased]</b>"$'\n'"$CHANGELOG"
          fi

          # inline keyboard (ΊΧε ΉνΕΉΩΡ 3Έ▓ΕΊΛ╝)
          ROW=$(jq -nc --arg u "$PREVIEW_URL" '[{text:"ΏθΝΡ Open", url:$u}]')
          ROW=$(echo "$ROW" | jq -c --arg c "https://github.com/$REPO/commit/$SHA" \
                '. + [{text:"ΏθΥζ Commit", url:$c}]')
          if [ -n "$PR_URL" ]; then
            ROW=$(echo "$ROW" | jq -c --arg u "$PR_URL" --arg n "$PR_NUMBER" \
                  '. + [{text:("ΏθΦΑ PR #" + $n), url:$u}]')
          fi
          KBD=$(echo "$ROW" | jq -c '[.]')

          # ΉιΕΉΗκ
          jq -nc --arg c "$TG_CHAT_ID" --arg t "$MSG" --argjson k "$KBD" \
            '{chat_id:$c, text:$t, parse_mode:"HTML",
              disable_web_page_preview:true,
              reply_markup:{inline_keyboard:$k}}' \
          | curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H 'Content-Type: application/json' --data-binary @- > /dev/null

          echo "έεΥ sent to Telegram chat $TG_CHAT_ID"
