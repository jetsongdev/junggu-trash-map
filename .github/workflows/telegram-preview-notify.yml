name: Telegram deploy notify

on:
  deployment_status:
  # GitHub이 deployment_status 이벤트를 가끔 drop함 — 그런 경우 Actions UI에서
  # 수동 dispatch로 같은 알림을 발사. SHA만 받고 가장 최신 deployment를 lookup.
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA (full or 7+ chars). 그 SHA의 최신 deployment 사용'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  deployments: read

jobs:
  notify:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.deployment_status.state == 'success' ||
      github.event.deployment_status.state == 'failure' ||
      github.event.deployment_status.state == 'error'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve deployment context
        id: ctx
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          REPO:         ${{ github.repository }}
          EVENT_NAME:   ${{ github.event_name }}
          INPUT_SHA:    ${{ inputs.sha }}
          EVENT_SHA:    ${{ github.event.deployment.sha }}
          EVENT_REF:    ${{ github.event.deployment.ref }}
          EVENT_ENV:    ${{ github.event.deployment.environment }}
          EVENT_STATE:  ${{ github.event.deployment_status.state }}
          EVENT_TARGET: ${{ github.event.deployment_status.target_url }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if ! echo "$INPUT_SHA" | grep -qE '^[0-9a-f]{7,40}$'; then
              echo "::error::Invalid SHA: $INPUT_SHA"; exit 1
            fi
            DEPS=$(gh api "/repos/$REPO/deployments?sha=$INPUT_SHA" 2>/dev/null || echo "[]")
            DEP_ID=$(echo "$DEPS" | jq -r '.[0].id // empty')
            if [ -z "$DEP_ID" ]; then
              echo "::error::No deployment found for SHA $INPUT_SHA"; exit 1
            fi
            SHA=$(echo "$DEPS"  | jq -r '.[0].sha')
            REF=$(echo "$DEPS"  | jq -r '.[0].ref // empty')
            ENV=$(echo "$DEPS"  | jq -r '.[0].environment // "Preview"')
            ST=$(gh api "/repos/$REPO/deployments/$DEP_ID/statuses" 2>/dev/null || echo "[]")
            # 가장 최신 status(.[0])만 사용. terminal(success/failure/error)이
            # 아니면 abort. 옛 terminal status를 끌어와 발사하면 redeploy/재시도
            # 도중 stale 알림이 나갈 수 있음. statuses는 GitHub API가 created_at
            # desc로 반환 → .[0]이 진짜 latest.
            LATEST=$(echo "$ST" | jq -c '.[0] // empty')
            if [ -z "$LATEST" ]; then
              echo "::error::Deployment $DEP_ID has no statuses yet — wait for terminal."
              exit 1
            fi
            STATE=$(echo "$LATEST" | jq -r '.state')
            case "$STATE" in
              success|failure|error) ;;
              *)
                echo "::error::Deployment $DEP_ID latest status is non-terminal: '$STATE'. 빌딩 또는 재시도 중일 수 있음 — wait for terminal."
                exit 1
                ;;
            esac
            TARGET=$(echo "$LATEST" | jq -r '.target_url // ""')
          else
            SHA="$EVENT_SHA"
            REF="$EVENT_REF"
            ENV="$EVENT_ENV"
            STATE="$EVENT_STATE"
            TARGET="$EVENT_TARGET"
          fi
          echo "sha=$SHA"             >> "$GITHUB_OUTPUT"
          echo "ref=$REF"             >> "$GITHUB_OUTPUT"
          echo "environment=$ENV"     >> "$GITHUB_OUTPUT"
          echo "state=$STATE"         >> "$GITHUB_OUTPUT"
          echo "target_url=$TARGET"   >> "$GITHUB_OUTPUT"

      - name: Look up PR for deployed SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.ctx.outputs.sha }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh api "/repos/$REPO/commits/$SHA/pulls" 2>/dev/null || echo "[]")
          # 에러 응답이 object로 오면 빈 배열로 처리
          if echo "$PR_JSON" | jq -e 'type != "array"' >/dev/null 2>&1; then
            PR_JSON="[]"
          fi
          echo "number=$(echo "$PR_JSON"   | jq -r '.[0].number   // empty')" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$PR_JSON"      | jq -r '.[0].html_url // empty')" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$PR_JSON"    | jq -r '.[0].title    // empty')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON" | jq -r '.[0].head.ref // empty')" >> "$GITHUB_OUTPUT"

      - name: Checkout repo at deployed SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.sha }}
          fetch-depth: 1

      - name: Extract & format CHANGELOG [Unreleased]
        id: cl
        run: |
          set -euo pipefail
          [ -f CHANGELOG.md ] || { echo "content=" >> "$GITHUB_OUTPUT"; exit 0; }

          UNREL=$(awk '/^## \[Unreleased\]/{f=1; next} /^## \[/{f=0} f' CHANGELOG.md | sed '/./,$!d')
          [ -z "$UNREL" ] && { echo "content=" >> "$GITHUB_OUTPUT"; exit 0; }

          # HTML escape (& < > 만)
          ESC=$(printf '%s' "$UNREL" | python3 -c 'import sys,html; print(html.escape(sys.stdin.read()), end="")')

          # ### Header → <b>Header</b>, "- " → "• "
          FMT=$(printf '%s' "$ESC" | sed -E 's@^### (.+)$@<b>\1</b>@; s@^- @• @')

          # 줄 단위 truncate
          MAX=20
          TOTAL=$(printf '%s\n' "$FMT" | wc -l | tr -d ' ')
          if [ "$TOTAL" -gt "$MAX" ]; then
            # head는 N행 읽고 stdin을 닫아 printf에 SIGPIPE → set -o pipefail에서
            # 스크립트 중단됨 (CHANGELOG가 20행 넘는 SHA에서 hit). awk는 입력 끝까지
            # 읽고 NR<=m만 출력해 pipe를 끝까지 흘림.
            BODY=$(printf '%s\n' "$FMT" | awk -v m="$MAX" 'NR<=m')
            BODY="${BODY}"$'\n'"<i>…and $((TOTAL - MAX)) more lines</i>"
          else
            BODY="$FMT"
          fi

          {
            echo "content<<EOF_CL"
            printf '%s\n' "$BODY"
            echo "EOF_CL"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Telegram
        env:
          TG_BOT_TOKEN:     ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:       ${{ secrets.TG_CHAT_ID }}
          TG_TOPIC_PREVIEW: ${{ vars.TG_TOPIC_PREVIEW }}
          TG_TOPIC_PROD:    ${{ vars.TG_TOPIC_PROD }}
          TG_TOPIC_ERROR:   ${{ vars.TG_TOPIC_ERROR }}
          DEPLOY_URL:       ${{ steps.ctx.outputs.target_url }}
          ENVIRONMENT:      ${{ steps.ctx.outputs.environment }}
          STATE:            ${{ steps.ctx.outputs.state }}
          REF:              ${{ steps.ctx.outputs.ref }}
          SHA:              ${{ steps.ctx.outputs.sha }}
          REPO:             ${{ github.repository }}
          PR_NUMBER:        ${{ steps.pr.outputs.number }}
          PR_URL:           ${{ steps.pr.outputs.url }}
          PR_TITLE:         ${{ steps.pr.outputs.title }}
          PR_HEAD_REF:      ${{ steps.pr.outputs.head_ref }}
          CHANGELOG:        ${{ steps.cl.outputs.content }}
        run: |
          set -euo pipefail
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "::warning::TG_BOT_TOKEN or TG_CHAT_ID missing"; exit 0
          fi

          # 토픽 + 라벨/이모지/태그 라우팅
          if [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
            TOPIC="$TG_TOPIC_ERROR"
            ENV_TAG="error"
            ENV_EMOJI="❌"
            ENV_LABEL="Deploy ${STATE}"
          elif [ "$ENVIRONMENT" = "Production" ]; then
            TOPIC="$TG_TOPIC_PROD"
            ENV_TAG="production"
            ENV_EMOJI="🎯"
            ENV_LABEL="Production deploy"
          else
            TOPIC="$TG_TOPIC_PREVIEW"
            ENV_TAG="preview"
            ENV_EMOJI="🚀"
            ENV_LABEL="Preview deploy"
          fi

          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          PROJECT=$(echo "$REPO" | cut -d/ -f2)
          PROJECT_TAG=$(echo "$PROJECT" | tr '-' '_')

          # 진짜 브랜치명: PR head.ref 우선, 없으면 deployment.ref, SHA처럼 보이면 비움
          DISPLAY_REF="${PR_HEAD_REF:-$REF}"
          if echo "$DISPLAY_REF" | grep -qE '^[0-9a-f]{40}$'; then
            DISPLAY_REF=""
          fi

          # 해시태그
          TAGS="#${PROJECT_TAG} #${ENV_TAG}"
          [ -n "$PR_NUMBER" ] && TAGS="$TAGS #PR${PR_NUMBER}"

          # HTML escape helper
          esc() { printf '%s' "$1" | python3 -c 'import sys,html; print(html.escape(sys.stdin.read()), end="")'; }

          PROJECT_E=$(esc "$PROJECT")
          PR_TITLE_E=$(esc "$PR_TITLE")
          REF_E=$(esc "$DISPLAY_REF")

          # 본문
          MSG="$TAGS"$'\n\n'"$ENV_EMOJI <b>$PROJECT_E</b> — $ENV_LABEL"
          if [ -n "$PR_TITLE_E" ]; then
            MSG="$MSG"$'\n'"└ <i>$PR_TITLE_E</i>"
          fi
          if [ -n "$REF_E" ]; then
            MSG="$MSG"$'\n'"└ <code>$REF_E</code> · <code>$SHORT_SHA</code>"
          else
            MSG="$MSG"$'\n'"└ <code>$SHORT_SHA</code>"
          fi
          if [ -n "$CHANGELOG" ]; then
            MSG="$MSG"$'\n\n'"📋 <b>[Unreleased]</b>"$'\n'"$CHANGELOG"
          fi

          # inline keyboard (한 줄에 최대 3버튼) — DEPLOY_URL 비어있으면 Open 생략
          ROW="[]"
          if [ -n "$DEPLOY_URL" ]; then
            ROW=$(jq -nc --arg u "$DEPLOY_URL" '[{text:"🌐 Open", url:$u}]')
          fi
          ROW=$(echo "$ROW" | jq -c --arg c "https://github.com/$REPO/commit/$SHA" \
                '. + [{text:"📝 Commit", url:$c}]')
          if [ -n "$PR_URL" ]; then
            ROW=$(echo "$ROW" | jq -c --arg u "$PR_URL" --arg n "$PR_NUMBER" \
                  '. + [{text:("🔀 PR #" + $n), url:$u}]')
          fi
          KBD=$(echo "$ROW" | jq -c '[.]')

          # payload — message_thread_id는 TOPIC 값 있을 때만 (빈 값/"0" → General fallback)
          PAYLOAD=$(jq -nc \
            --arg c "$TG_CHAT_ID" \
            --arg t "$MSG" \
            --argjson k "$KBD" \
            --arg topic "$TOPIC" \
            '{chat_id:$c, text:$t, parse_mode:"HTML",
              disable_web_page_preview:true,
              reply_markup:{inline_keyboard:$k}}
             + (if $topic != "" and $topic != "0"
                then {message_thread_id:($topic|tonumber)}
                else {} end)')

          curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' --data-binary "$PAYLOAD" > /dev/null

          echo "✓ sent $ENV_LABEL → chat $TG_CHAT_ID, topic ${TOPIC:-General}"
